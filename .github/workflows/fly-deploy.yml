name: Deploy to Fly.io

on:
  workflow_dispatch:  # Se déclenche uniquement de manière manuelle pour la démo publique

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # Empêche les déploiements concurrents
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a bot-telegram-vip
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Notify deployment success
        if: success()
        run: echo "✅ Deployment to production successful!"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Deployment to production failed!"
